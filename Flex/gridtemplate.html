<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        @media screen {
            
        }
        .container{
            display : grid;
            height: 100vh;
            
                
            


            grid-template-areas: "cabeca cabeca cabeca cabeca"
                                 "main main . lateral"
                                 "rodape rodape rodape rodape";

        }
        @media (max-width:500px) {
            .container {display: grid;
            grid-template-rows: 100px 200px 30vh;
            grid-template-areas: "cabecario"
                                 "main"
                                 "sidebar"
                                 "footer";
            
            }
            
            
        }
        .box{border: 1px solid black;
        display: flex;
        border-radius: 8%;
        }
        #box1{grid-area: cabeca; background-color: orange;}
        #box2{grid-area: main; background-color: lightskyblue;}
        #box3{grid-area: lateral; background-color: red;}
        #box4{grid-area: rodape; background-color:forestgreen;}
    </style>
</head>
<body>
    <div class="container">
        <div class="box" id="box1">header</div>
        <div class="box" id="box2">main</div>
        <div class="box" id="box3">sidebar</div>
        <div class="box" id="box4">footer</div>
        
    </div>
    
</body>
</html>
