<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5b</title>

<style>
    body{
        margin: 0;
    }

    .container{
        display: grid;
        height: 100vh;
        width: 100vw;
        gap: 2px;

        grid-template-columns: 2fr 2fr 2fr 2fr 1fr;
        grid-template-rows: 1fr 1fr 1fr;

        grid-template-areas:
        "um um dois tres tres"
        "quatro quatro dois cinco balls"
        "seis seis seis cinco balls";
    }

    

    #bx1{ grid-area: um; background-color: orange; }
    #bx2{ grid-area: dois; background-color: rgb(227, 180, 115); }
    #bx3{ grid-area: tres; background-color: rgb(102, 166, 255); }
    #bx4{ grid-area: quatro; background-color: rgb(0, 86, 198); }
    #bx5{ grid-area: cinco; background-color: lightgreen; }
    #bx6{ grid-area: seis; background-color: orange; }
    .pelotas{
        grid-area: balls;
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        align-items: center;
    }

    .bola{
        width: 40px;
        height: 40px;
        border-radius: 50%;
    }

    #bola1{ background-color: orange; }
    #bola2{ background-color: pink; }
    #bola3{ background-color: green; }
    #bola4{ background-color: blue; }

    @media (max-width:600px) {
        .container{
        display: grid;
        height: 100vh;
        grid-template-areas: "um dois"
                             "quatro quatro"
                             "cinco seis"
                             "cinco balls";
        
        grid-template-columns: 2fr 2fr;
        grid-template-rows: 1fr 1fr 1fr 1fr;

        }
    } 

</style>
</head>

<body>

<div class="container">
    <div class="box" id="bx1"></div>
    <div class="box" id="bx2"></div>
    <div class="box" id="bx3"></div>
    <div class="box" id="bx4"></div>
    <div class="box" id="bx5"></div>
    <div class="box" id="bx6"></div>

    <div class="pelotas">
        <div class="bola" id="bola1"></div>
        <div class="bola" id="bola2"></div>
        <div class="bola" id="bola3"></div>
        <div class="bola" id="bola4"></div>
</div>
    
</body>
</html>
