<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3</title>

  <style>
    
    .franca {
      display: flex;
      width: 300px;
      height: 150px;
    }

    .franca div {
      flex: 1;
    }

    .azul { background-color: blue; }
    .branco { background-color: white; }
    .vermelho { background-color: red; }

    
    .alemanha {
      display: flex;
      flex-direction: column;
      width: 300px;
      height: 150px;
      margin-top: 20px;
    }

    .alemanha div {
      flex: 1;
    }

    .preto { background-color: black; }
    .vermelho2 { background-color: red; }
    .amarelo { background-color: yellow; }

    
    .japao {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 300px;
      height: 150px;
      background-color: white;
      margin-top: 20px;
      border: solid black;
    }

    .bola {
      width: 80px;
      height: 80px;
      background-color: red;
      border-radius: 50%;
    }
  </style>
</head>

<body>

  
  <div class="franca">
    <div class="azul"></div>
    <div class="branco"></div>
    <div class="vermelho"></div>
  </div>

  
  <div class="alemanha">
    <div class="preto"></div>
    <div class="vermelho2"></div>
    <div class="amarelo"></div>
  </div>

  
  <div class="japao">
    <div class="bola"></div>
  </div>

</body>
</html>
